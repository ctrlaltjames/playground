<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2a2f45;
      --text: #e8eaed;
      --text-muted: #8b92a8;
      --accent: #6c8cff;
      --accent-hover: #8aa4ff;
      --success: #4ade80;
      --danger: #f87171;
      --danger-hover: #fca5a5;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .app {
      width: 100%;
      max-width: 560px;
    }

    header {
      margin-bottom: 1.75rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9375rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus {
      border-color: var(--accent);
    }

    .add-form input::placeholder {
      color: var(--text-muted);
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      transition: background 0.15s, color 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 0.75rem 1.25rem;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-icon {
      background: transparent;
      color: var(--text-muted);
      padding: 0.4rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .btn-icon.danger:hover {
      color: var(--danger);
    }

    .stats {
      display: flex;
      gap: 1rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .stats span strong {
      color: var(--text);
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      transition: opacity 0.2s, border-color 0.15s;
    }

    .task-item.completed {
      opacity: 0.65;
    }

    .task-item.completed .task-text {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .checkbox:hover {
      border-color: var(--accent);
    }

    .task-item.completed .checkbox {
      background: var(--success);
      border-color: var(--success);
    }

    .checkbox svg {
      width: 12px;
      height: 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .task-item.completed .checkbox svg {
      opacity: 1;
    }

    .task-text {
      flex: 1;
      font-size: 0.9375rem;
      cursor: default;
      min-width: 0;
    }

    .task-text.editing {
      cursor: text;
    }

    .task-edit-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9375rem;
      padding: 0.35rem 0.5rem;
      outline: none;
      min-width: 0;
    }

    .task-actions {
      display: flex;
      gap: 0.15rem;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-state p:first-child {
      font-size: 1.125rem;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .filter-bar {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .filter-btn {
      background: transparent;
      color: var(--text-muted);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8125rem;
    }

    .filter-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--surface);
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .clear-completed {
      margin-top: 1rem;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8125rem;
      padding: 0.5rem;
      width: 100%;
      text-align: center;
    }

    .clear-completed:hover {
      color: var(--danger);
    }

    .clear-completed:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .clear-completed:disabled:hover {
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>To Do</h1>
      <p class="subtitle">Tasks persist across refreshes</p>
    </header>

    <form class="add-form" id="addForm">
      <input
        type="text"
        id="taskInput"
        placeholder="What needs to be done?"
        autocomplete="off"
        aria-label="New task"
      />
      <button type="submit" class="btn-primary">Add</button>
    </form>

    <div class="stats" id="stats"></div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul class="task-list" id="taskList"></ul>

    <button class="clear-completed" id="clearCompleted" disabled>
      Clear completed
    </button>
  </div>

  <script>
    const STORAGE_KEY = "todo-app-tasks";

    let tasks = loadTasks();
    let filter = "all";
    let editingId = null;

    const addForm = document.getElementById("addForm");
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");
    const stats = document.getElementById("stats");
    const filterBar = document.getElementById("filterBar");
    const clearCompletedBtn = document.getElementById("clearCompleted");

    function loadTasks() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      tasks.unshift({
        id: generateId(),
        text: trimmed,
        completed: false,
        createdAt: Date.now(),
      });

      saveTasks();
      render();
    }

    function removeTask(id) {
      tasks = tasks.filter((t) => t.id !== id);
      if (editingId === id) editingId = null;
      saveTasks();
      render();
    }

    function toggleComplete(id) {
      const task = tasks.find((t) => t.id === id);
      if (task) {
        task.completed = !task.completed;
        saveTasks();
        render();
      }
    }

    function updateTaskText(id, text) {
      const trimmed = text.trim();
      if (!trimmed) {
        removeTask(id);
        return;
      }

      const task = tasks.find((t) => t.id === id);
      if (task) {
        task.text = trimmed;
        saveTasks();
      }
      editingId = null;
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter((t) => !t.completed);
      saveTasks();
      render();
    }

    function getFilteredTasks() {
      switch (filter) {
        case "active":
          return tasks.filter((t) => !t.completed);
        case "completed":
          return tasks.filter((t) => t.completed);
        default:
          return tasks;
      }
    }

    function renderStats() {
      const total = tasks.length;
      const done = tasks.filter((t) => t.completed).length;
      const active = total - done;

      stats.innerHTML = `
        <span><strong>${total}</strong> total</span>
        <span><strong>${active}</strong> active</span>
        <span><strong>${done}</strong> completed</span>
      `;

      clearCompletedBtn.disabled = done === 0;
    }

    function renderTaskItem(task) {
      const li = document.createElement("li");
      li.className = "task-item" + (task.completed ? " completed" : "");
      li.dataset.id = task.id;

      const checkbox = document.createElement("div");
      checkbox.className = "checkbox";
      checkbox.setAttribute("role", "checkbox");
      checkbox.setAttribute("aria-checked", task.completed);
      checkbox.setAttribute("aria-label", "Toggle complete");
      checkbox.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="#0f1117" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l3 3 5-5"/></svg>`;
      checkbox.addEventListener("click", () => toggleComplete(task.id));

      li.appendChild(checkbox);

      if (editingId === task.id) {
        const input = document.createElement("input");
        input.type = "text";
        input.className = "task-edit-input";
        input.value = task.text;
        input.setAttribute("aria-label", "Edit task");

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            updateTaskText(task.id, input.value);
          } else if (e.key === "Escape") {
            editingId = null;
            render();
          }
        });

        input.addEventListener("blur", () => {
          updateTaskText(task.id, input.value);
        });

        li.appendChild(input);
        requestAnimationFrame(() => {
          input.focus();
          input.select();
        });
      } else {
        const text = document.createElement("span");
        text.className = "task-text";
        text.textContent = task.text;
        text.addEventListener("dblclick", () => {
          editingId = task.id;
          render();
        });
        li.appendChild(text);
      }

      const actions = document.createElement("div");
      actions.className = "task-actions";

      const editBtn = document.createElement("button");
      editBtn.className = "btn-icon";
      editBtn.setAttribute("aria-label", "Edit task");
      editBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z"/></svg>`;
      editBtn.addEventListener("click", () => {
        editingId = task.id;
        render();
      });

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "btn-icon danger";
      deleteBtn.setAttribute("aria-label", "Delete task");
      deleteBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M6 4V3h4v1M5 4v9h6V4"/></svg>`;
      deleteBtn.addEventListener("click", () => removeTask(task.id));

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      li.appendChild(actions);

      return li;
    }

    function render() {
      const filtered = getFilteredTasks();

      taskList.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        if (tasks.length === 0) {
          empty.innerHTML = "<p>No tasks yet</p><p>Add one above to get started</p>";
        } else if (filter === "active") {
          empty.innerHTML = "<p>All done!</p><p>No active tasks remaining</p>";
        } else if (filter === "completed") {
          empty.innerHTML = "<p>Nothing completed</p><p>Check off tasks to see them here</p>";
        }
        taskList.appendChild(empty);
      } else {
        filtered.forEach((task) => {
          taskList.appendChild(renderTaskItem(task));
        });
      }

      renderStats();

      filterBar.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.filter === filter);
      });
    }

    addForm.addEventListener("submit", (e) => {
      e.preventDefault();
      addTask(taskInput.value);
      taskInput.value = "";
      taskInput.focus();
    });

    filterBar.addEventListener("click", (e) => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      filter = btn.dataset.filter;
      render();
    });

    clearCompletedBtn.addEventListener("click", clearCompleted);

    render();
  </script>
</body>
</html>
